services:
  postgres:
    image: postgres:16-alpine
    container_name: calcetto-punti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: calcetto_punti
      POSTGRES_USER: calcetto
      POSTGRES_PASSWORD: calcetto
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
